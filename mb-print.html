<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>D228 - Mass & Balance Print</title>
        <link href="css/theme.css" rel="stylesheet">
        <link href="css/mb.css" rel="stylesheet">
        <link href="css/mb-print.css" rel="stylesheet">
    </head>
    <body class="mb-print-body">
        <div class="mb-print-toolbar no-print">
            <button id="btnPrintNow" type="button" class="btn">Imprimir / Guardar PDF</button>
            <button id="btnClosePrint" type="button" class="btn btn-secondary">Fechar</button>
        </div>
        <main class="mb-print-page">
            <section id="mbPrintCapture" class="mb-print-capture">
                <div id="mb-table">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 100px; align-items: center;">
                        <img src="img/sevenair.png" loading="eager" alt="Sevenair logo" class="mb-print-logo"">
                        <div id="heading" style="grid-column: 2;">
                            <h2>Weight &amp; Balance</h2>
                            <p id="ac-selected"></p>
                            <p id="nomeLeg"></p>
                        </div>
                        <div id="mbPrintTimestamp" aria-live="polite" style="grid-column: 3; grid-row: 1; text-align: right; display: flex; align-items: center; justify-content: end;"></div>
                    </div>
                    <table class="mb-table">
                        <thead>
                            <tr>
                                <th scope="col" id="thead-item">Item</th>
                                <th scope="col">Weight (kg)</th>
                                <th scope="col">Moment (kg&middot;m)</th>
                                <th scope="col" id="thead-info">INFO</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr style="border-bottom: 5px double #000000; border-top-width: 0px; border-left-width: 0px; border-right-width: 0px;">
                                <td style="text-align: center; font-size: calc(0 + 0px); width: calc(0 + 0px);">Basic weight</td>
                                <td id="basicWeight" style="text-align: center; font-size: calc(0 + 0px); width: calc(0 + 0px);">0</td>
                                <td id="basicMoment" style="text-align: center; font-size: calc(0 + 0px); width: calc(0 + 0px);">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr>
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">
                                    <label for="pilots" style="text-align: center; line-height: 35px; font-size: calc(0 + 0px); width: calc(0px + 0px); min-width: calc(0 + 0px); max-width: calc(0 + 0px);">Pilots</label>
                                </td>
                                <td style="text-align: center; font-size: calc(0 + 0px);">
                                    <input id="pilots" class="popup-fuel" type="number" inputmode="numeric" step="any" value="150" style="text-align: center; font-size: calc(0 + 0px); width: 85%; resize: horizontal; height: 35px; border-radius: 10px; border-width: 1px; border-style: dotted;">
                                </td>
                                <td id="momentPilots">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr>
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">
                                    <label for="manualPayload" style="text-align: center; line-height: 35px; font-size: calc(0 + 0px); width: calc(0px + 0px); min-width: calc(0 + 0px); max-width: calc(0 + 0px);">Payload</label>
                                </td>
                                <td style="text-align: center; font-size: calc(0 + 0px);">
                                    <input id="manualPayload" class="popup-fuel" type="number" inputmode="numeric" step="any" value="0" style="text-align: center; font-size: calc(0 + 0px); width: 85%; resize: horizontal; height: 35px; border-radius: 10px; border-width: 1px; border-style: dotted;">
                                    <input type="hidden" id="momentPayloadInput">
                                </td>
                                <td id="momentPayload">0</td>
                                <td style="font-size: 12px; color: #ff0000;" id="Info-maxfuel"></td>
                            </tr>
                            <tr class="gray-row" style="background-color: #ededed;">
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">ZFW</td>
                                <td id="zfw" style="text-align: center; font-size: calc(0 + 0px);">0</td>
                                <td id="momentZfw">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr>
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">
                                    <label for="fuel">Fuel loading</label>
                                </td>
                                <td style="text-align: center; font-size: calc(0 + 0px);">
                                    <input id="fuel" class="popup-fuel" type="number" inputmode="numeric" step="any" value="0" style="text-align: center; font-size: calc(0 + 0px); width: 85%; resize: horizontal; height: 35px; border-radius: 10px; border-width: 1px; border-style: dotted;">
                                </td>
                                <td id="momentFuel">0</td>
                                <td style="font-size: 12px; color: #ff0000;" id="Info-maxpayload"></td>
                            </tr>
                            <tr id="rampRow" class="gray-row" style="background-color: #ededed;">
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">Ramp Weight</td>
                                <td id="rampWeight" class="limit-check" style="text-align: center; font-size: calc(0 + 0px);">0</td>
                                <td id="momentRamp">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr>
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">
                                    <label for="fuelTaxi">Fuel taxi</label>
                                </td>
                                <td style="text-align: center; font-size: calc(0 + 0px);">
                                    <input id="fuelTaxi" class="popup-fuel" type="number" inputmode="numeric" step="any" value="30" style="text-align: center; font-size: calc(0 + 0px); width: 85%; resize: horizontal; height: 35px; border-radius: 10px; border-width: 1px; border-style: dotted;">
                                </td>
                                <td id="momentTaxi">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr id="takeoffRow" class="gray-row" style="background-color: #ededed;">
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">Take-off Weight</td>
                                <td id="takeoffWeight" class="limit-check" style="text-align: center; font-size: calc(0 + 0px);">0</td>
                                <td id="momentTakeoff">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr>
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">
                                    <label for="fuelDest" style="text-align: center; line-height: 20px; font-size: calc(0 + 0px); width: calc(0px + 0px); min-width: calc(0 + 0px); max-width: calc(0 + 0px);">Fuel to destination</label>
                                </td>
                                <td style="text-align: center; font-size: calc(0 + 0px);">
                                    <input id="fuelDest" class="popup-fuel" type="number" inputmode="numeric" step="any" value="0" style="text-align: center; font-size: calc(0 + 0px); width: 85%; resize: horizontal; height: 35px; border-radius: 10px; border-width: 1px; border-style: dotted;">
                                </td>
                                <td id="momentDest">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                            <tr id="landingRow" class="gray-row" style="background-color: #ededed;">
                                <td style="text-align: center; line-height: 20px; font-size: calc(0 + 0px);">Landing Weight</td>
                                <td id="landingWeight" class="limit-check" style="text-align: center; font-size: calc(0 + 0px);">0</td>
                                <td id="momentLanding">0</td>
                                <td style="font-size: 12px;"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="loadsheet-img" style="position: relative; display: inline-block;">
                    <img id="loadsheet-base" loading="eager" fetchpriority="high" alt="Envelope CG" style="width: 100%; height: auto;">
                    <svg id="cg-svg" viewBox="0 0 400 300" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></svg>
                </div>
            </section>
            <div class="mb-print-footer">
                <img src="img/sevenair.png" loading="eager" alt="Sevenair logo">
            </div>
        </main>
        <script src="js/general.js"></script>
        <script src="js/dataLoader.js"></script>
        <script src="js/mb.js"></script>
        <script src="js/mb-print.js"></script>
    </body>
</html>
