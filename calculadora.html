<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <link rel="stylesheet" href="css/theme.css">
        <link rel="stylesheet" href="css/calculadora.css">
        <link rel="stylesheet" href="css/menu.css">
    </head>
    <body>
        <header>
            <div id="header"></div>
        </header>
        <main class="container">
            <section class="section calculator-block">
                <div class="time-calculator">
                    <h3 class="block-title">Calculadora de Tempo</h3>

                    <div class="total-mobile-card">
                        <span>Total acumulado</span>
                        <strong id="totalDisplay">00h 00m</strong>
                    </div>

                    <div class="time-input-grid">
                        <label>
                            Horas
                            <input id="hoursInput" type="text" readonly inputmode="none" placeholder="00">
                        </label>
                        <label>
                            Minutos
                            <input id="minutesInput" type="text" readonly inputmode="none" placeholder="00">
                        </label>
                    </div>

                    <div class="keypad" id="timeKeypad" aria-label="Teclado numérico">
                        <button type="button" data-key="1">1</button>
                        <button type="button" data-key="2">2</button>
                        <button type="button" data-key="3">3</button>
                        <button type="button" data-key="4">4</button>
                        <button type="button" data-key="5">5</button>
                        <button type="button" data-key="6">6</button>
                        <button type="button" data-key="7">7</button>
                        <button type="button" data-key="8">8</button>
                        <button type="button" data-key="9">9</button>
                        <button type="button" data-action="clear">C</button>
                        <button type="button" data-key="0">0</button>
                        <button type="button" data-action="backspace">⌫</button>
                    </div>

                    <div class="manual-actions">
                        <button id="manualAddBtn" type="button" class="primary-btn">Somar</button>
                        <button id="manualSubtractBtn" type="button" class="danger-btn">Subtrair</button>
                    </div>

                    <section class="history-screen" aria-label="Ecrã de histórico">
                        <div class="history-header">
                            <h4>Histórico</h4>
                            <small id="historyCount">0 registos</small>
                        </div>
                        <ul id="historyList" class="history-list"></ul>
                    </section>
                </div>
            </section>

            <section class="section conversions-block">
                <div class="calc-block">
                    <h2 class="block-title">Conversões</h2>
                    <div class="conversion-line">
                        <label>lb ↔ kg</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="lb" placeholder="lb" oninput="lbToKg()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="kg" placeholder="kg" oninput="kgToLb()">
                    </div>
                    <div class="conversion-line">
                        <label>L ↔ lb</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="Lts" placeholder="L" oninput="lToLbA1()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="lbA1" placeholder="Lb" oninput="lbA1ToL()">
                    </div>
                    <div class="conversion-line">
                        <label>USG ↔ L</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="usg" placeholder="USG" oninput="usgToL()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="l" placeholder="L" oninput="lToUsg()">
                    </div>
                    <div class="conversion-line">
                        <label>ft ↔ m</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="ft" placeholder="ft" oninput="ftToM()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="m" placeholder="m" oninput="mToFt()">
                    </div>
                    <div class="conversion-line">
                        <label>NM ↔ km</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="nm" placeholder="NM" oninput="nmToKm()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="km" placeholder="km" oninput="kmToNm()">
                    </div>
                    <div class="conversion-line">
                        <label>kt ↔ km/h</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="kt" placeholder="kt" oninput="ktToKmh()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="kmh" placeholder="km/h" oninput="kmhToKt()">
                    </div>
                </div>
            </section>
        </main>
        <script src="js/general.js"></script>
        <script src="js/calculadora.js"></script>
    </body>
</html>
